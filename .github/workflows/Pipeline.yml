name: pipeline
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: docker authenticate
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/varione:latest
            ${{ secrets.DOCKER_USERNAME }}/varione:${{ github.sha }}

  apply:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: inject image tag
        run: |
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/varione:.*|image: ${{ secrets.DOCKER_USERNAME }}/varione:${{ github.sha }}|" k3s/k3s.yml

      - name: copy manifest to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATEKEY }}
          source: "k3s/*"
          target: "~/app"

      - name: apply k3s
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATEKEY }}
          script: |
            kubectl apply -f ~/app/k3s/k3s.yml
            kubectl rollout status deployment/varione --timeout=60s
